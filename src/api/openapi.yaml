openapi: '3.0.3'
info:
  title: WikiSubmission Quran Backend
  description: >
    A dual-purpose API serving as a high-performance multilingual Quran reader
    and a staging ground for the translation editorial workflow.

    ## Key Conventions

    ### Minified JSON Keys
    All response objects use short field names to minimise bandwidth. The mapping is:

    | Short key | Full name        |
    |-----------|-----------------|
    | `cn`      | chapter_number  |
    | `vi`      | verse_index     |
    | `vk`      | verse_key       |
    | `tr`      | translations    |
    | `w`       | words           |
    | `wi`      | word_index      |
    | `gi`      | global_index    |
    | `tx`      | text / content  |
    | `li`      | lang_id         |
    | `lc`      | lang_code       |
    | `d`       | direction       |
    | `s`       | subtitle        |
    | `f`       | footer          |
    | `r`       | root            |
    | `m`       | meaning         |
    | `hl`      | highlight       |
    | `sc`      | score           |
    | `tm`      | title_match     |
    | `bn`      | book_number     |
    | `bk`      | book_name / key |
    | `t`       | testament       |
    | `cc`      | chapter_count   |
    | `vc`      | verse_count     |

    ### Reader vs Search
    - `/quran` — reader mode. Returns a contiguous range of verses identified by
      chapter/verse numbers or the compact `verses` shorthand. All reader fields in
      `QuranResponseInfo` (`chapter_start`, `chapter_end`, `verse_start`, `verse_end`)
      are populated; search fields (`q`, `total`, `scope`) are absent.
    - `/search` — full-text search mode. Returns results ranked by relevance across
      all indexed languages. Search fields in `QuranResponseInfo` are populated; reader
      range fields are absent.

    ### Bible API
    The Bible API mirrors the Quran API structure but scoped to the 66 canonical books.
    Book numbers are 1-based (1 = Genesis … 66 = Revelation). Verse keys use a
    three-part format `book:chapter:verse` (e.g. `40:5:3` = Matthew 5:3).

    ### Authentication
    Reader/Bible/Music/Roots/Community endpoints are public.
    `/me/*` endpoints require a bearer token.

    ### Versioning
    The API is versioned via the URL path (`/api/v1/…`). Breaking changes will
    increment the version number.
  version: '1.0'
  contact:
    email: contact@wikisubmission.org

servers:
  - url: http://localhost:8082/api/v1
    description: Development server
  - url: https://ws-backend.wikisubmission.org/api/v1
    description: Production Server
  - url: http://ws-backend.internal/api/v1
    description: Internal Production Server
  - url: https://ws-backend-vc.wikisubmission.org/api/v1
    description: railway, temp test

tags:
  - name: Reader
    description: >
      Public read-only endpoints for the Quran — verses, chapters, languages,
      appendices, and full-text / semantic search.
  - name: Bible
    description: >
      Public read-only endpoints for the Bible — book metadata, verse ranges
      (reader mode), and full-text search.
  - name: Music
    description: >
      Public read-only endpoints for music — artists, categories, albums, and
      tracks. All lists are unfiltered by default; use query parameters to narrow
      results.
  - name: Roots
    description: >
      Quranic Arabic roots concordance. Provides a paginated index of roots,
      per-root detail with derived surface forms, and per-root verse occurrences.
      Backed by `word_text.word_root` aggregated into a materialized view.
  - name: Communities
    description: >
      Online and physical community directory sourced from the Sanity content
      lake. Reads are cached server-side and invalidated by webhook on
      document changes.
  - name: Me
    description: >
      Authenticated per-user endpoints for bookmarks, notes, reading progress,
      streaks, preferences, and collections.
  - name: Games
    description: >
      Quran games. v1 ships "Fill the Missing Word" with curated passages,
      deterministic per-variant generation, and global/weekly/per-variant
      leaderboards. All endpoints require authentication.

paths:
  /languages:
    get:
      tags: [Reader]
      operationId: getLanguages
      summary: List supported languages
      description: >
        Returns all languages supported by the API, including the internal
        integer `id`, the ISO 639-1 `code` (used as a key in translation maps),
        the human-readable `name`, and the text `direction` (`ltr` or `rtl`).
        Use the `code` values from this endpoint as valid values for any `langs`
        or `word_langs` parameter throughout the API.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Language'
        "500":
          $ref: "#/components/responses/InternalServerErrror"

  /chapters:
    get:
      tags: [Reader]
      operationId: getChapters
      summary: Fetch chapter metadata
      description: >
        Returns metadata for all 114 Quranic chapters: chapter number, verse
        count, revelation order, and the chapter title in the requested language.
        If `lang` is omitted the title is returned in the default language (English).
        Use this endpoint to build a chapter-picker UI or map chapter numbers to
        human-readable titles.
      parameters:
        - name: lang
          in: query
          required: false
          description: >
            ISO 639-1 language code for the chapter title (e.g. `en`, `ar`, `fr`).
            Must be a code returned by `/languages`. Defaults to `en` when omitted.
          schema:
            type: string
          example: en
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterMetadata'
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  /appendices:
    get:
      tags: [Reader]
      operationId: getAppendices
      summary: Fetch appendix metadata
      description: >
        Returns metadata for all Quranic appendices: a numeric code, a title, and
        a short snippet. If `lang` is omitted the title and snippet are returned in
        the default language (English).
      parameters:
        - name: lang
          in: query
          required: false
          description: >
            ISO 639-1 language code for the appendix title and snippet
            (e.g. `en`, `ar`). Must be a code returned by `/languages`.
          schema:
            type: string
          example: en
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppendixMetadata'
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  /quran:
    get:
      tags: [Reader]
      operationId: getQuran
      summary: Fetch a range of verses
      description: >
        Returns a contiguous range of Quranic verses in one or more languages
        simultaneously. Two selection modes are supported:

        **Range mode** — use `chapter_number_start`, `verse_start`, `verse_end`,
        and optionally `chapter_number_end` to specify a span.

        **Compact mode** — use the `verses` parameter with a shorthand reference
        string. When `verses` is present it takes priority over all range params.

        Optional word-level data (Arabic text, root, meaning) can be added with
        `include_words`, `include_root`, and `include_meaning`.
      parameters:
        - name: chapter_number_start
          in: query
          required: false
          description: >
            First (or only) chapter to include, 1-based (1–114). When
            `chapter_number_end` is omitted, only this chapter is queried.
            Ignored when `verses` is provided.
          schema:
            type: integer
            minimum: 1
            maximum: 114
          example: 2
        - name: chapter_number_end
          in: query
          description: >
            Last chapter to include (inclusive), 1-based (1–114). Must be ≥
            `chapter_number_start`. Ignored when `verses` is provided.
          schema:
            type: integer
            minimum: 1
            maximum: 114
          example: 2
        - name: verse_start
          in: query
          description: >
            First verse to include within `chapter_number_start`. Use `0` for
            the Basmallah; `1` and above for numbered verses. Defaults to 1
            when omitted. Ignored when `verses` is provided.
          schema:
            type: integer
            minimum: 0
          example: 1
        - name: verse_end
          in: query
          description: >
            Last verse to include within `chapter_number_end` (or
            `chapter_number_start` if no end chapter), 1-based. Defaults to the
            last verse of the chapter when omitted. Ignored when `verses` is
            provided.
          schema:
            type: integer
            minimum: 1
          example: 5
        - name: verses
          in: query
          required: false
          description: >
            Compact verse reference string. Takes priority over all
            chapter/verse range params when present. Supported formats:

            - Single verse: `1:1`
            - Range within a chapter: `1:1-7`
            - Comma-separated list: `1:2,2:255,2:285-286`

            Maximum 300 verses per request.
          schema:
            type: string
          example: "2:255,2:285-286"
        - name: langs
          in: query
          required: true
          explode: true
          description: >
            One or more ISO 639-1 language codes to include in the response.
            Each code must be a value returned by `/languages`.
            Translations for each code appear inside every verse's `tr` map.
          schema:
            type: array
            items:
              type: string
          example: ["en", "ar"]
        - $ref: '#/components/parameters/WordLangsParam'
        - $ref: '#/components/parameters/IncludeWordsParam'
        - $ref: '#/components/parameters/IncludeRootParam'
        - $ref: '#/components/parameters/IncludeMeaningParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuranResponse'
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  /search:
    get:
      tags: [Reader]
      operationId: search
      summary: Full-text search across the Quran
      description: >
        Full-text search across verse translations and chapter titles in all
        indexed languages. Supports fuzzy / partial matching via `pg_trgm`.

        **Scope `verses` (default)** — searches the translated text of each
        verse. Returns verses ranked by FTS relevance, optionally boosted by
        vector similarity when `semantic=true`.

        **Scope `words`** — searches word-level Arabic / transliteration text.
        When `root` is also provided with `scope=words`, an exact root match is
        performed instead of FTS.

        Results are paginated with `limit` / `offset`. Use the `total` field in
        the response envelope to calculate page count.
      parameters:
        - name: q
          in: query
          required: false
          description: >
            Search query (2–200 characters). Supports quoted phrases and
            exclusions (e.g. `"mercy of God" -punishment`). Required unless
            `root` is provided with `scope=words`.
          schema:
            type: string
            minLength: 2
            maxLength: 200
          example: "mercy of God"
        - name: root
          in: query
          required: false
          description: >
            Arabic root string (3–4 letters, e.g. `رحم`). When provided with
            `scope=words`, performs an exact match on `word_root` instead of
            running FTS. Takes priority over `q`.
          schema:
            type: string
          example: "رحم"
        - name: langs
          in: query
          explode: true
          description: >
            ISO 639-1 language codes to search in. When omitted, all indexed
            languages are searched simultaneously. Only affects which translation
            columns are queried — returned verse objects always include the
            translations for these codes.
          schema:
            type: array
            items:
              type: string
          example: ["en"]
        - name: scope
          in: query
          description: >
            Whether to search verse translations (`verses`) or word-level Arabic /
            transliteration text (`words`). Defaults to `verses`.
          schema:
            type: string
            enum: [verses, words]
            default: verses
          example: verses
        - name: limit
          in: query
          description: Maximum number of verses to return per page (1–100). Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          description: >
            Number of results to skip before returning the page. Use with
            `limit` and the `total` field for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: semantic
          in: query
          required: false
          description: >
            Enable hybrid semantic search (FTS + vector RRF fusion) when the
            server has an embedding model configured. Defaults to `true` when
            `OPENAI_API_KEY` is set, otherwise `false`. Set to `false` to force
            pure keyword FTS regardless of server configuration.
          schema:
            type: boolean
          example: true
        - $ref: '#/components/parameters/WordLangsParam'
        - $ref: '#/components/parameters/IncludeWordsParam'
        - $ref: '#/components/parameters/IncludeRootParam'
        - $ref: '#/components/parameters/IncludeMeaningParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuranResponse'
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  # --- ROOTS API ---

  /roots:
    get:
      tags: [Roots]
      operationId: getRoots
      summary: Paginated roots index
      description: >
        Returns a paginated list of distinct Arabic roots aggregated from
        `word_text.word_root`, with per-root occurrence counts and a
        server-computed Latin Buckwalter transliteration (`tr`).

        Supports three sort modes (`frequency`, `abjadi`, `reverse`) and an
        optional Arabic prefix filter. Use `limit` / `offset` for pagination;
        `total` reflects the filtered universe so page count is consistent.
      parameters:
        - name: q
          in: query
          required: false
          description: >
            Arabic prefix filter against root letters. The frontend MUST send
            space-separated Arabic letters matching the storage form (e.g.
            `ك ت` or `ك ت ب`); Latin or Buckwalter input is not accepted on
            the server.
          schema:
            type: string
          example: "ك ت"
        - name: sort
          in: query
          required: false
          description: >
            Ordering mode. `frequency` orders by descending occurrence count
            (most-attested first). `abjadi` orders by classical abjadi rank
            (composite over the first three letters). `reverse` is the inverse
            abjadi ordering.
          schema:
            type: string
            enum: [frequency, abjadi, reverse]
            default: frequency
          example: frequency
        - name: limit
          in: query
          required: false
          description: Page size. Default 50. No upper bound — paginate via `offset` for large pulls.
          schema:
            type: integer
            minimum: 1
            default: 50
          example: 50
        - name: offset
          in: query
          required: false
          description: Number of items to skip before returning the page.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootsIndexResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /roots/{letters}:
    get:
      tags: [Roots]
      operationId: getRootDetail
      summary: Full root record
      description: >
        Returns full metadata for a single root: count, transliteration,
        distinct derived surface forms (`dv`), and the first 20 occurrences
        (`oc`). Use `/roots/{letters}/occurrences` to paginate beyond the
        first 20.
      parameters:
        - name: letters
          in: path
          required: true
          description: >
            URL-encoded space-separated Arabic letters of the root (e.g.
            `%D9%83%20%D8%AA%20%D8%A8` for `ك ت ب`). Must match the storage
            form exactly.
          schema:
            type: string
          example: "ك ت ب"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootRecord'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /roots/{letters}/occurrences:
    get:
      tags: [Roots]
      operationId: getRootOccurrences
      summary: Paginated occurrences for a single root
      description: >
        Returns paginated verse occurrences for the given root, ordered by
        canonical reading order (`global_index`). Use `total` for page count.
      parameters:
        - name: letters
          in: path
          required: true
          description: >
            URL-encoded space-separated Arabic letters of the root.
          schema:
            type: string
          example: "ك ت ب"
        - name: limit
          in: query
          required: false
          description: Page size. Default 50. No upper bound.
          schema:
            type: integer
            minimum: 1
            default: 50
          example: 50
        - name: offset
          in: query
          required: false
          description: Number of occurrences to skip before returning the page.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: surface
          in: query
          required: false
          description: >
            Optional Arabic surface form filter. When provided, narrows the
            result set to occurrences where the matched word equals this exact
            string (used by the Word Lab "click derivative chip" flow). The
            `total` field reflects the filtered universe.
          schema:
            type: string
          example: "كِتَاب"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccurrencesResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  # --- BIBLE API ---

  /bible/books:
    get:
      tags: [Bible]
      operationId: getBibleBooks
      summary: List all Bible books
      description: >
        Returns summary metadata for all 66 canonical Bible books: book number,
        book name, testament (`OT` or `NT`), chapter count, and total verse count.
        Use `bn` (book_number) from this list as the `book` parameter in `/bible`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BibleBook'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /bible:
    get:
      tags: [Bible]
      operationId: getBible
      summary: Fetch Bible verses by range
      description: >
        Returns verses for a specific Bible book and chapter/verse range in one
        or more languages simultaneously. The response groups verses by book and
        chapter, mirroring the `/quran` response structure.

        To fetch an entire chapter, supply only `book` and `chapter_start` — the
        server defaults `verse_start` to 1 and `verse_end` to the last verse.

        To fetch a single verse, supply `book`, `chapter_start`, `verse_start`,
        and set `verse_end` equal to `verse_start`.
      parameters:
        - name: book
          in: query
          required: true
          description: >
            1-based Bible book number. 1 = Genesis, 40 = Matthew, 66 = Revelation.
            Use `/bible/books` to retrieve the full list of book numbers and names.
          schema:
            type: integer
            minimum: 1
            maximum: 66
          example: 40
        - name: chapter_start
          in: query
          required: true
          description: >
            First chapter to include, 1-based and within the bounds of the
            requested book. Use `/bible/books` to find each book's `cc`
            (chapter_count).
          schema:
            type: integer
            minimum: 1
          example: 5
        - name: chapter_end
          in: query
          required: false
          description: >
            Last chapter to include (inclusive), 1-based. Must be ≥
            `chapter_start`. Defaults to `chapter_start` when omitted (single
            chapter).
          schema:
            type: integer
            minimum: 1
          example: 5
        - name: verse_start
          in: query
          required: false
          description: >
            First verse to include within `chapter_start`, 1-based. Defaults
            to 1 (beginning of the chapter) when omitted.
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: verse_end
          in: query
          required: false
          description: >
            Last verse to include within `chapter_end` (or `chapter_start`),
            1-based. Defaults to the last verse of the chapter when omitted.
          schema:
            type: integer
            minimum: 1
          example: 12
        - name: langs
          in: query
          required: true
          explode: true
          description: >
            One or more ISO 639-1 language codes to include. Each code must be
            returned by `/languages`. Currently the primary supported code is
            `en` (English).
          schema:
            type: array
            items:
              type: string
          example: ["en"]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BibleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /bible/search:
    get:
      tags: [Bible]
      operationId: searchBible
      summary: Full-text search across the Bible
      description: >
        Full-text search over Bible verse content and footnotes. Results are
        grouped by book and chapter, ordered by relevance score descending.
        Paginate with `limit` and `offset`; use the `total` field in the response
        envelope to compute total pages.
      parameters:
        - name: q
          in: query
          required: true
          description: >
            Search query (2–200 characters). Matched against verse text and
            footnotes using PostgreSQL full-text search. Supports quoted phrases.
          schema:
            type: string
            minLength: 2
            maxLength: 200
          example: "blessed are the meek"
        - name: langs
          in: query
          required: false
          explode: true
          description: >
            ISO 639-1 language codes to search in. When omitted, all indexed
            languages are searched. Currently the primary supported code is `en`.
          schema:
            type: array
            items:
              type: string
          example: ["en"]
        - name: limit
          in: query
          required: false
          description: Maximum number of verses to return per page (1–100). Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          required: false
          description: >
            Number of results to skip before returning the page. Use with
            `limit` and `total` for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BibleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  # --- MUSIC API ---

  /music/artists:
    get:
      tags: [Music]
      operationId: getMusicArtists
      summary: List all music artists
      description: >
        Returns all artists in the music catalogue, ordered by `display_priority`
        ascending (lower number = shown first). Use `id` to filter albums and
        tracks by artist.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicArtist'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /music/categories:
    get:
      tags: [Music]
      operationId: getMusicCategories
      summary: List all music categories
      description: >
        Returns all music categories (genres / themes), ordered by
        `display_priority` ascending. Use `id` to filter tracks by category.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicCategory'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /music/albums:
    get:
      tags: [Music]
      operationId: getMusicAlbums
      summary: List music albums
      description: >
        Returns all albums, optionally filtered by artist. Albums are returned
        in no guaranteed order; sort client-side by `release_date` or `name` as
        needed.
      parameters:
        - name: artist_id
          in: query
          description: >
            Filter results to albums belonging to this artist. Must be an `id`
            returned by `/music/artists`. Omit to return all albums.
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicAlbum'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /music/tracks:
    get:
      tags: [Music]
      operationId: getMusicTracks
      summary: List music tracks
      description: >
        Returns tracks, with optional filters for artist, category, album, and
        featured status. Multiple filters can be combined — they are applied as
        AND conditions. Omit all filters to retrieve the full catalogue.
      parameters:
        - name: artist_id
          in: query
          description: >
            Return only tracks by this artist. Must be an `id` returned by
            `/music/artists`.
          schema:
            type: integer
          example: 1
        - name: category_id
          in: query
          description: >
            Return only tracks in this category. Must be an `id` returned by
            `/music/categories`.
          schema:
            type: integer
          example: 2
        - name: album_id
          in: query
          description: >
            Return only tracks from this album. Must be an `id` returned by
            `/music/albums`.
          schema:
            type: integer
          example: 3
        - name: featured
          in: query
          description: >
            When `true`, return only featured (hand-picked) tracks. When omitted
            or `false`, featured and non-featured tracks are both included.
          schema:
            type: boolean
          example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicTrack'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /communities:
    get:
      tags: [Communities]
      operationId: getCommunities
      summary: List communities (online and physical)
      description: >
        Returns active community entries authored in Sanity (online communities
        on platforms like Discord/Telegram, plus physical meet-up locations).
        Backed by the Sanity content lake; results are cached server-side and
        invalidated by webhook on document changes.
      parameters:
        - name: kind
          in: query
          required: false
          description: Filter by community kind.
          schema:
            type: string
            enum: [online, physical]
          example: online
        - name: language
          in: query
          required: false
          description: ISO 639-1 language code of the community.
          schema:
            type: string
          example: en
        - name: country
          in: query
          required: false
          description: ISO 3166-1 alpha-2 country code (physical communities only).
          schema:
            type: string
            minLength: 2
            maxLength: 2
          example: US
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Community'
