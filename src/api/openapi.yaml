    # -----------------------------------------------------------------------
    # Games — Fill the Missing Word
    # -----------------------------------------------------------------------
    GamePassage:
      type: object
      required: [id, chapter_start, verse_start, chapter_end, verse_end, label, themes]
      properties:
        id:
          type: integer
          format: int64
          example: 42
        chapter_start:
          type: integer
          example: 1
        verse_start:
          type: integer
          example: 1
        chapter_end:
          type: integer
          example: 1
        verse_end:
          type: integer
          example: 7
        label:
          type: string
          example: "The Key — opening prayer"
        themes:
          type: array
          items:
            type: string
          example: ["worship", "guidance"]

    GamePassageListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/GamePassage'

    StartGameVariantRequest:
      type: object
      required: [language, difficulty, size]
      properties:
        passage_id:
          type: integer
          format: int64
          description: >
            When omitted the server selects a passage automatically based on
            the player's adaptive skill band. When provided the exact passage
            is used regardless of skill band.
          example: 42
        language:
          type: string
          enum: [en, ar, ac, fa, ur, fr, de, es, sv, tr, id, tl, ru, bn, ta]
          example: en
        difficulty:
          type: string
          enum: [easy, medium, hard, professional, adaptive]
          description: >
            Difficulty tier for the round. Use `adaptive` to let the server
            pick the tier based on the player's recent accuracy across all
            tiers. The resolved tier is always returned in the GameVariant.
          example: hard
        size:
          type: string
          enum: [short, medium, long, adaptive]
          description: >
            Round size (number of blanks). Use `adaptive` to let the server
            pick based on the player's total attempt history. The resolved
            size is always returned in the GameVariant.
          example: medium
        variant_id:
          type: string
          description: >
            When provided, resume the exact variant referenced. Returns 404 if
            the variant does not exist. Without this field the server returns
            the lowest-counter variant the caller has not yet attempted,
            minting a new one if all existing variants are consumed.
          example: "p42-en-hard-medium-7"

    GameRenderedVerse:
      type: object
      required: [verse_key, text]
      properties:
        verse_key:
          type: string
          example: "1:2"
        text:
          type: string
          description: >
            Verse text with each removed word replaced by a
            `__BLANK_<index>__` token. Indices match the corresponding entries
            in the `blanks` array.
          example: "__BLANK_0__ be to GOD, Lord of the universe."

    GameBlank:
      type: object
      required: [index, verse_key, word_position]
      properties:
        index:
          type: integer
          description: 0-based blank index within the variant.
          example: 0
        verse_key:
          type: string
          example: "1:2"
        word_position:
          type: integer
          description: 0-based word index of the blank inside its verse.
          example: 0
        options:
          type: array
          description: >
            Only present for `difficulty = easy`. Shuffled deterministically;
            exactly one is the answer.
          items:
            type: string
        hint:
          $ref: '#/components/schemas/GameBlankHint'

    GameBlankHint:
      type: object
      description: >
        Toggleable hints for a blank. Present only for `difficulty = medium`.
        Each revealed hint costs a flat penalty (see the score formula); the
        client tracks how many it reveals and reports the total via
        `hints_used` on submit. Fields are derived from the answer and never
        contain the full answer.
      required: [first_letter, first_two, length]
      properties:
        first_letter:
          type: string
          description: First character of the answer, preserving source case.
          example: "P"
        first_two:
          type: string
          description: First two characters of the answer (or the whole answer if it is a single character).
          example: "Pr"
        length:
          type: integer
          description: Character count of the answer.
          example: 6

    GameVariant:
      type: object
      required: [variant_id, session_id, passage, language, difficulty, size, rendered_verses, blanks, replay]
      properties:
        variant_id:
          type: string
          example: "p42-en-hard-medium-7"
        session_id:
          type: string
          description: >
            Unique ID for this play session. Pass back on every checkBlank
            and submit call so the server can track per-blank wrong attempts.
          example: "01HBJV5Z6Q5T7B5W2J4N8Q3X9F"
        passage:
          $ref: '#/components/schemas/GamePassage'
        language:
          type: string
          enum: [en, ar, ac, fa, ur, fr, de, es, sv, tr, id, tl, ru, bn, ta]
        difficulty:
          type: string
          enum: [easy, medium, hard, professional]
        size:
          type: string
          enum: [short, medium, long]
        rendered_verses:
          type: array
          items:
            $ref: '#/components/schemas/GameRenderedVerse'
        blanks:
          type: array
          items:
            $ref: '#/components/schemas/GameBlank'
        replay:
          type: boolean
          description: >
            True when this variant has already been played by the caller and
            the server cycled back because every other variant in the group
            has also been played.
        skill_band:
          type: string
          enum: [easy, medium, hard]
          description: >
            The adaptive difficulty band used when selecting blanks for this
            variant. Derived from the player's recent accuracy at this tier;
            not settable by the client.

    GameVariantEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/GameVariant'

    GameGuess:
      type: object
      required: [index, value]
      properties:
        index:
          type: integer
          example: 0
        value:
          type: string
          example: "Praise"

    SubmitGameAttemptRequest:
      type: object
      required: [variant_id, guesses, hints_used]
      properties:
        variant_id:
          type: string
          example: "p42-en-hard-medium-7"
        session_id:
          type: string
          description: >
            Session ID returned by startVariant. When provided the server
            reads per-blank wrong-attempt counts and applies a graduated
            penalty. Omitting it (e.g. resumed from a shared link) skips
            the wrong-attempt penalty.
          example: "01HBJV5Z6Q5T7B5W2J4N8Q3X9F"
        guesses:
          type: array
          items:
            $ref: '#/components/schemas/GameGuess'
        hints_used:
          type: integer
          minimum: 0
          example: 1
        elapsed_ms:
          type: integer
          description: Time taken in milliseconds. Tiebreaker only.
          minimum: 0
          example: 73214

    GamePerBlankResult:
      type: object
      required: [index, correct]
      properties:
        index:
          type: integer
        correct:
          type: boolean
        accepted_answer:
          type: string
          description: >
            Always present on submit. The correct answer for this blank,
            shown after the round ends regardless of whether the guess was right.

    GameSubmitResult:
      type: object
      required: [attempt_id, score, correct_count, total_count, per_blank, difficulty_multiplier, hint_penalty, wrong_penalty]
      properties:
        attempt_id:
          type: string
          example: "01HBJV5Z6Q5T7B5W2J4N8Q3X9F"
        score:
          type: integer
          example: 1485
        correct_count:
          type: integer
          example: 7
        total_count:
          type: integer
          example: 8
        per_blank:
          type: array
          items:
            $ref: '#/components/schemas/GamePerBlankResult'
        difficulty_multiplier:
          type: number
          format: double
          example: 2.0
        hint_penalty:
          type: integer
          example: 25
        wrong_penalty:
          type: integer
          description: >
            Total score deduction from wrong attempts across all blanks.
            Each additional wrong attempt on the same blank costs progressively
            more: attempt N costs N×10 points.
          example: 30

    GameSubmitResultEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/GameSubmitResult'

    GameLeaderboardEntry:
      type: object
      required: [rank, user_id, score, size, difficulty, attempted_at]
      properties:
        rank:
          type: integer
        user_id:
          type: integer
          format: int64
        display_name:
