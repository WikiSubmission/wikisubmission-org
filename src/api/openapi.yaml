components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -----------------------------------------------------------------------
  # Reusable parameters shared across Reader endpoints
  # -----------------------------------------------------------------------
  parameters:
    WordLangsParam:
      name: word_langs
      in: query
      explode: true
      description: >
        Language codes for word-level text. Must be a subset of the `langs`
        array. Only words in these languages are included in the `tx` map of
        each `WordData` object. Typically set to `["ar"]` to include Arabic
        word text alongside an English translation.
      schema:
        type: array
        items:
          type: string
      example: ["ar"]
    IncludeWordsParam:
      name: include_words
      in: query
      description: >
        When `true`, each verse includes a `w` array of `WordData` objects
        with per-word text (and optionally root / meaning). When `false`
        (default), the `w` array is entirely omitted from each verse, keeping
        the response compact.
      schema:
        type: boolean
        default: false
      example: false
    IncludeRootParam:
      name: include_root
      in: query
      description: >
        When `true`, each `WordData` object includes the `r` field containing
        the Arabic root (3–4 letters). Requires `include_words=true`. Has no
        effect when `include_words=false`.
      schema:
        type: boolean
        default: false
      example: false
    IncludeMeaningParam:
      name: include_meaning
      in: query
      description: >
        When `true`, each `WordData` object includes the `m` field containing
        an English gloss / meaning for the word. Requires `include_words=true`.
        Has no effect when `include_words=false`.
      schema:
        type: boolean
        default: false
      example: false
    MeScriptureParam:
      name: scripture
      in: query
      required: false
      description: Scripture scope for user data.
      schema:
        type: string
        enum: [quran, bible]
        default: quran
      example: quran

  schemas:
    # -----------------------------------------------------------------------
    # Core response — shared by /quran and /search
    # -----------------------------------------------------------------------
    QuranResponse:
      type: object
      description: >
        Top-level envelope for both `/quran` (reader) and `/search` (FTS)
        responses. The `info` object describes the query parameters that were
        resolved; `chapters` contains the matching verses grouped by chapter.
      properties:
        info:
          $ref: '#/components/schemas/QuranResponseInfo'
        chapters:
          type: array
          items:
            $ref: '#/components/schemas/ChapterData'

    QuranResponseInfo:
      type: object
      description: >
        Metadata envelope describing the resolved query. Reader fields
        (`chapter_start`, `chapter_end`, `verse_start`, `verse_end`) are
        populated by `/quran` and absent from `/search` responses. Search fields
        (`q`, `total`, `limit`, `offset`, `scope`) are populated by `/search`
        and absent from `/quran` responses.
      properties:
        result_count:
          type: integer
          description: >
            Number of verses returned in this response page. For `/quran` this
            equals the total number of matching verses (no pagination); for
            `/search` this is the number of verses on the current page (≤
            `limit`).
          example: 7
        # Reader fields
        chapter_start:
          type: integer
          description: >
            Resolved first chapter of the query range (reader only). Reflects
            the `chapter_number_start` param after server validation.
          example: 2
        chapter_end:
          type: integer
          description: >
            Resolved last chapter of the query range (reader only). Equal to
            `chapter_start` when no end chapter was requested.
          example: 2
        verse_start:
          type: integer
          description: >
            Resolved first verse of the query range (reader only). Defaults to
            1 when the param was omitted.
          example: 1
        verse_end:
          type: integer
          description: >
            Resolved last verse of the query range (reader only). Defaults to
            the final verse of the chapter when the param was omitted.
          example: 7
        # Search fields
        q:
          type: string
          description: >
            The search query as submitted by the client (search only).
          example: "mercy of God"
        total:
          type: integer
          description: >
            Total number of matching verses across ALL pages (search only). Use
            together with `limit` and `offset` to calculate the total page count
            and navigate paginated results.
          example: 42
        limit:
          type: integer
          description: Page size used for this response (search only).
          example: 20
        offset:
          type: integer
          description: Number of results skipped before this page (search only).
          example: 0
        scope:
          type: string
          description: >
            Search scope that was applied (search only). `verses` means verse
            translation text was searched; `words` means word-level Arabic /
            transliteration text was searched.
          example: verses

    ChapterData:
      type: object
      description: >
        A single Quranic chapter with its matching verses. In reader mode all
        verses within the requested range are included. In search mode only
        verses that matched the query are included, and the `hits` and `tm`
        fields are populated.
      properties:
        cn:
          type: integer
          description: chapter_number — Quranic chapter number, 1-based (1–114).
          example: 1
        titles:
          type: object
          description: >
            Map of chapter titles keyed by ISO 639-1 language code. Only codes
            that were requested in `langs` (or all available codes for
            `/chapters`) are present.
          additionalProperties:
            type: string
          example:
            en: "The Opening"
            ar: "الفاتحة"
        verses:
          type: array
          items:
            $ref: '#/components/schemas/VerseData'
        hits:
          type: integer
          description: >
            Number of verses in this chapter that matched the search query
            (search only). Absent from `/quran` responses.
          example: 3
        tm:
          type: boolean
          description: >
            title_match — `true` when the chapter title itself matched the
            search query, not just verse content (search only). Absent from
            `/quran` responses.
          example: false

    VerseData:
      type: object
      description: >
        A single Quranic verse with its translations in the requested languages,
        and optionally word-by-word data.
      properties:
        vi:
          type: integer
          description: >
            verse_index — 0-based position of this verse within its chapter.
            The first verse (`vi: 0`) is verse 1.
          example: 0
        vk:
          type: string
          description: >
            verse_key — `chapter_number:verse_number` (1-based), e.g. `2:255`
            for Ayat al-Kursi or `1:1` for the Fatiha opening verse.
          example: "1:1"
        sc:
          type: number
          format: float
          description: >
            Relevance score assigned by the FTS / semantic ranker (search only).
            Higher values indicate stronger relevance to the query. Absent from
            `/quran` responses.
          example: 0.87
        tr:
          type: object
          description: >
            Translations keyed by ISO 639-1 language code. Only the codes
            requested via `langs` are present. Example:
            `{ "en": { ... }, "ar": { ... } }`.
          additionalProperties:
            $ref: '#/components/schemas/TranslationContent'
        w:
          type: array
          description: >
            Word-by-word breakdown of the verse (present only when
            `include_words=true`). Each element represents one Arabic word in
            reading order.
          items:
            $ref: '#/components/schemas/WordData'

    TranslationContent:
      type: object
      description: >
        A single translation of a verse in one language. All short field names
        follow the minified key convention documented in the info section.
      properties:
        li:
          type: integer
          description: lang_id — internal integer identifier for this language.
          example: 1
        lc:
          type: string
          description: >
            lang_code — ISO 639-1 language code, e.g. `en`, `ar`, `fr`.
          example: "en"
        d:
          type: string
          enum: [ltr, rtl]
          description: >
            direction — text direction for this language. `ltr` for Latin-script
            languages (English, French, …); `rtl` for Arabic, Hebrew, Urdu, etc.
          example: "ltr"
        tx:
          type: string
          description: Full translation text of this verse in this language.
          example: "In the name of God, the Gracious, the Merciful."
        s:
          type: string
          nullable: true
          description: >
            subtitle — chapter-level subtitle or section heading associated
            with this verse (Quran-specific, nullable). Typically appears only
            on verse 1 of a chapter.
          example: null
        f:
          type: string
          nullable: true
          description: >
            footer — translator's footnote or clarification appended after the
            verse text (nullable). May contain cross-references or explanatory
            notes.
          example: null
        hl:
          type: string
          nullable: true
          description: >
            Highlighted snippet with `<b>…</b>` tags wrapping the matched terms
            (search only). Suitable for rendering search result previews. `null`
            in `/quran` responses.
          example: "In the name of <b>God</b>, the Gracious, the Merciful."

    WordData:
      type: object
      description: >
        Data for a single Arabic word within a verse. Returned only when
        `include_words=true`. Fields `r` and `m` require their respective
        `include_root` / `include_meaning` params to be `true`.
      properties:
        wi:
          type: integer
          description: >
            word_index — 0-based position of this word within its verse. The
            first word of the verse is `wi: 0`.
          example: 0
        gi:
          type: integer
          description: >
            global_index — unique 1-based index of this word across the entire
            Quran (all chapters, all verses, in reading order).
          example: 1
        tx:
          type: object
          description: >
            Word text keyed by language code (e.g. `{ "ar": "بِسْمِ" }`). Only
            codes requested via `word_langs` are present. `null` if no
            `word_langs` were requested.
          additionalProperties:
            type: string
          nullable: true
          example:
            ar: "بِسْمِ"
        hl:
          type: object
          description: >
            Highlighted word text keyed by language code, with `<b>` tags around
            the matched portion (word search only). `null` for non-search
            responses or when the word did not match.
          additionalProperties:
            type: string
          nullable: true
          example: null
        r:
          type: string
          nullable: true
          description: >
            root — Arabic root of the word (3–4 letter root form, e.g. `رحم`
            for words related to mercy). `null` unless `include_root=true`.
          example: "سمو"
        m:
          type: string
          nullable: true
          description: >
            meaning — English gloss / meaning of this specific word form
            (e.g. `"in the name of"`). `null` unless `include_meaning=true`.
          example: "in the name of"
        meta:
          type: object
          nullable: true
          description: >
            Arbitrary metadata object containing morphological tags, grammar
            notes, or other word-level annotations. Structure may vary and
            should be treated as opaque unless documented separately.
          example: null

    # -----------------------------------------------------------------------
    # Roots concordance schemas
    # -----------------------------------------------------------------------
    RootSummary:
      type: object
      description: >
        Compact record for one Quranic Arabic root, returned by the index
        endpoint. `r` is the storage form (space-separated Arabic letters);
        `tr` is the server-computed Latin Buckwalter transliteration joined
        with hyphens (e.g. `k-t-b`). `s` is reserved for an editorial sense
        gloss and is currently always `null`.
      required: [r, tr, c]
      properties:
        r:
          type: string
          description: Root letters, space-separated Arabic (storage form).
          example: "ك ت ب"
        tr:
          type: string
          description: >
            Latin Buckwalter transliteration of the root, lowercase letters
            joined with `-`. Computed server-side from `r`.
          example: "k-t-b"
        s:
          type: string
          nullable: true
          description: >
            Editorial sense gloss for this root (Phase 2; always `null` for
            now).
          example: null
        c:
          type: integer
          description: Total occurrence count of this root across the corpus.
          example: 319

    RootRecord:
      description: >
        Full record for one root, including derived surface forms (`dv`) and
        the first 20 verse occurrences (`oc`). Paginate beyond 20 via
        `/roots/{letters}/occurrences`.
      allOf:
        - $ref: '#/components/schemas/RootSummary'
        - type: object
          properties:
            dv:
              type: array
              description: >
                Distinct derived surface forms of this root, capped at 20 and
                ordered by descending count.
              items:
                $ref: '#/components/schemas/Derivative'
            oc:
              type: array
              description: >
                First 20 verse occurrences of this root, ordered by canonical
                reading order (`global_index`).
              items:
                $ref: '#/components/schemas/Occurrence'
            mp:
              type: string
              nullable: true
              description: >
                Morphology note for the root (Phase 2; always `null` for now).
              example: null
            m:
              type: string
              nullable: true
              description: >
                Per-root meaning string. The `meaning` column in `word_text` is
                denormalized — every surface form sharing this root carries the
                same string. The server returns one canonical row's value here.
                Senses are typically separated by `;`. May be `null` when no
                English meaning row exists for the root.
              example: "to write; note; record; collect; book; writing; scripture; decree; letter"

    Derivative:
      type: object
      description: >
        A distinct surface form (token spelling) of a root, with its
        occurrence count. `tr` is the Latin transliteration of the surface
        form, sourced from `word_text` rows tagged with the `tl` language
        (most-common value when multiple readings exist). `en` and `p` (POS)
        is sourced from `word_text` rows tagged with the `en` language (most-common
        value when multiple readings exist). `p` (POS) remains reserved for
        morphology data and is still `null`.
      required: [ar, c]
      properties:
        ar:
          type: string
          description: Surface form (Arabic word as it appears in the corpus).
          example: "كِتَاب"
        tr:
          type: string
          nullable: true
          description: >
            Latin transliteration of the surface form (e.g. "kitāb"). Drawn
            from the per-word `tl` entry in `word_text`. May be `null` if no
            transliteration row exists for that word.
          example: "kitāb"
        en:
          type: string
          nullable: true
          description: >
            Most common English gloss for this surface form, drawn from the
            per-word `en` entry in `word_text`. `null` if no English row exists
            for that word.
          example: "book"
        c:
          type: integer
          description: Number of occurrences of this exact surface form.
          example: 56
        p:
          type: string
          nullable: true
          enum: [V, N, ADJ, PASS, PRO, NEG, P, REL]
          description: Part-of-speech tag (Phase 2; always `null`).
          example: null

    Occurrence:
      type: object
      description: >
        One verse occurrence of a root. `vk` is the verse_key
        (`chapter_number:verse_number`); `ar` is the full Arabic verse text;
        `en` is the primary English translation when available; `hl` is the
        exact surface form to highlight inside `ar` on the client.
      required: [vk, ar]
      properties:
        vk:
          type: string
          description: verse_key — `chapter_number:verse_number`, both 1-based.
          example: "2:282"
        ar:
          type: string
          description: Full Arabic verse text.
          example: "يَا أَيُّهَا الَّذِينَ آمَنُوا إِذَا تَدَايَنتُم بِدَيْنٍ ..."
        en:
          type: string
          nullable: true
          description: Primary English translation of the verse (nullable).
          example: "O you who believe, when you transact a loan ..."
        hl:
          type: string
          nullable: true
          description: >
            Surface form (matched word) to highlight inside `ar`. Best-effort:
            the client may need to handle diacritics when locating the
            substring.
          example: "كِتَاب"
        tl:
          type: string
          nullable: true
          description: >
            Latin transliteration of the matched surface form (`hl`). Drawn
            from the per-word `tl` entry in `word_text`. May be `null` if no
            transliteration row exists for that word.
          example: "kitāb"
        wi:
          type: integer
          nullable: true
          description: >
            1-based word index of the matched word inside its verse. Lets the
            client highlight the exact token without resorting to substring
            matching (which mis-targets short surface forms like `مِن` that
            embed inside longer words like `مُؤْمِن`).
          example: 4

    RootsIndexResponse:
      type: object
      description: Paginated index of roots returned by `/roots`.
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RootSummary'
        total:
          type: integer
          description: Total number of distinct roots matching the optional `q` filter.
          example: 1689

    OccurrencesResponse:
      type: object
      description: Paginated occurrences for a single root.
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Occurrence'
        total:
          type: integer
          description: Total number of occurrences of this root in the corpus.
          example: 319

    Language:
      type: object
      description: A language supported by the API for translations and word text.
      properties:
        id:
          type: integer
          description: Internal integer identifier. Used internally; prefer `code` for all API calls.
          example: 1
        code:
          type: string
          description: >
            ISO 639-1 language code. Use this value in `langs`, `word_langs`,
            and `lang` parameters throughout the API.
          example: "en"
        name:
          type: string
          description: Human-readable language name in English.
          example: "English"
        direction:
          type: string
          enum: [ltr, rtl]
          description: >
            Text direction for this language. `ltr` for left-to-right scripts;
            `rtl` for right-to-left scripts (Arabic, Hebrew, Urdu, Persian).
          example: "ltr"

    ChapterMetadata:
      type: array
      description: List of metadata objects for all 114 Quranic chapters.
      items:
        $ref: '#/components/schemas/Chapter'

    Chapter:
      type: object
      description: Metadata for a single Quranic chapter.
      properties:
        chapter_number:
          type: integer
          description: Chapter number, 1-based (1–114). Also known as Surah number.
          example: 1
        verse_count:
          type: integer
          description: Total number of verses in this chapter.
          example: 7
        revelation_order:
          type: integer
          description: >
            Chronological order in which the chapter was revealed (1-based).
            Distinct from the canonical chapter_number ordering.
          example: 5
        title:
          type: string
          description: >
            Chapter title in the language requested via the `lang` parameter
            (or the default language if omitted).
          example: "The Opening"

    AppendixMetadata:
      type: array
      description: List of metadata objects for all Quranic appendices.
      items:
        $ref: '#/components/schemas/Appendix'

    Appendix:
      description: Metadata for a single Quranic appendix.
      properties:
        code:
          type: integer
          description: Numeric code identifying the appendix.
          example: 1
        title:
          type: string
          description: Title of the appendix in the requested language.
          example: "God's Attributes"
        snippet:
          type: string
          description: Short introductory excerpt from the appendix body.
          example: "The Quran teaches that God is One..."

    # -----------------------------------------------------------------------
    # Bible schemas
    # -----------------------------------------------------------------------
    BibleResponse:
      type: object
      description: >
        Top-level envelope for both `/bible` (reader) and `/bible/search` (FTS)
        responses. The `info` object describes the resolved query; `books`
        contains the matching verses grouped by book and chapter.
      properties:
        info:
          $ref: '#/components/schemas/BibleResponseInfo'
        books:
          type: array
          items:
            $ref: '#/components/schemas/BibleBookData'

    BibleResponseInfo:
      type: object
      description: >
        Metadata envelope for Bible responses. Reader fields (`book`,
        `chapter_start`, `chapter_end`, `verse_start`, `verse_end`) are
        populated by `/bible`; search fields (`q`, `total`, `limit`, `offset`)
        are populated by `/bible/search`.
      properties:
        result_count:
          type: integer
          description: Number of verses returned in this response page.
          example: 12
        book:
          type: integer
          description: >
            Requested book number (reader only). 1-based: 1 = Genesis,
            40 = Matthew, 66 = Revelation.
          example: 40
        chapter_start:
          type: integer
          description: Resolved first chapter of the query range (reader only).
          example: 5
        chapter_end:
          type: integer
          description: Resolved last chapter of the query range (reader only).
          example: 5
        verse_start:
          type: integer
          description: Resolved first verse of the query range (reader only).
          example: 1
        verse_end:
          type: integer
          description: Resolved last verse of the query range (reader only).
          example: 12
        q:
          type: string
          description: The search query as submitted (search only).
          example: "blessed are the meek"
        total:
          type: integer
          description: >
            Total matching results across all pages (search only). Use with
            `limit` and `offset` for pagination.
          example: 15
        limit:
          type: integer
          description: Page size used for this response (search only).
          example: 20
        offset:
          type: integer
          description: Number of results skipped before this page (search only).
          example: 0

    BibleBook:
      type: object
      description: Summary metadata for one Bible book, as returned by `/bible/books`.
      properties:
        bn:
          type: integer
          description: >
            book_number — 1-based index: 1 = Genesis, 40 = Matthew,
            66 = Revelation. Use this value as the `book` parameter in `/bible`.
          example: 40
        bk:
          type: string
          description: book_name — full English name of the book.
          example: "Matthew"
        t:
          type: string
          description: >
            testament — `OT` for Old Testament (books 1–39), `NT` for New
            Testament (books 40–66).
          example: "NT"
        cc:
          type: integer
          description: chapter_count — total number of chapters in this book.
          example: 28
        vc:
          type: integer
          description: verse_count — total number of verses in this book.
          example: 1071

    BibleBookData:
      type: object
      description: >
        A Bible book with nested chapters returned by `/bible` and
        `/bible/search`. In reader mode all chapters/verses in the requested
        range are included. In search mode only chapters/verses that matched
        the query are included.
      properties:
        bn:
          type: integer
          description: book_number — 1-based book index (1 = Genesis … 66 = Revelation).
          example: 40
        bk:
          type: string
          description: book_name — full English name of the book.
          example: "Matthew"
        t:
          type: string
          description: >
            testament — `OT` for Old Testament (books 1–39), `NT` for New
            Testament (books 40–66).
          example: "NT"
        chapters:
          type: array
          items:
            $ref: '#/components/schemas/BibleChapterData'

    BibleChapterData:
      type: object
      description: A single Bible chapter with its matching verses.
      properties:
        cn:
          type: integer
          description: chapter_number — 1-based chapter number within the book.
          example: 5
        hits:
          type: integer
          description: >
            Number of verses in this chapter that matched the search query
            (search only). Absent from `/bible` reader responses.
          example: 4
        verses:
          type: array
          items:
            $ref: '#/components/schemas/BibleVerseData'

    BibleVerseData:
      type: object
      description: A single Bible verse with its translations and optional relevance score.
      properties:
        vn:
          type: integer
          description: verse_number — 1-based verse number within its chapter.
          example: 3
        vk:
          type: string
          description: >
            verse_key — `book_number:chapter_number:verse_number` (all 1-based),
            e.g. `40:5:3` for Matthew 5:3 or `1:1:1` for Genesis 1:1.
          example: "40:5:3"
        sc:
          type: number
          format: float
          description: >
            Relevance score assigned by the FTS ranker (search only). Higher
            values indicate stronger relevance. Absent from `/bible` responses.
          example: 0.92
        tr:
          type: object
          description: >
            Translations keyed by ISO 639-1 language code. Only the codes
            requested via `langs` are present.
          additionalProperties:
            $ref: '#/components/schemas/BibleTranslationContent'

    BibleTranslationContent:
      type: object
      description: >
        A single translation of a Bible verse in one language. Field names
        follow the same minified key convention as the Quran API.
      properties:
        li:
          type: integer
          description: lang_id — internal integer identifier for this language.
          example: 1
        lc:
          type: string
          description: lang_code — ISO 639-1 language code, e.g. `en`.
          example: "en"
        d:
          type: string
          enum: [ltr, rtl]
          description: >
            direction — text direction for this language. `ltr` for Latin
            scripts; `rtl` for Arabic / Hebrew.
          example: "ltr"
        tx:
          type: string
          description: Full translation text of this verse in this language.
          example: "Blessed are the meek, for they will inherit the earth."
        f:
          type: string
          nullable: true
          description: >
            footer — short translator's footnote or clarification appended after
            the verse text (nullable).
          example: null
        fn:
          type: array
          items:
            type: string
          nullable: true
          description: >
            Theological footnotes — array of extended commentary strings
            (nullable). Distinct from `f` (short inline footnote): `fn` entries
            are longer annotations, cross-references, or theological
            explanations associated with this verse.
          example: null
        hl:
          type: string
          nullable: true
          description: >
            Highlighted snippet with `<b>…</b>` tags wrapping matched terms
            (search only). `null` in `/bible` reader responses.
          example: "Blessed are the <b>meek</b>, for they will inherit the earth."

    # --- Music schemas ---

    MusicArtist:
      type: object
      description: A music artist in the catalogue.
      required: [id, name, image_url, display_priority]
      properties:
        id:
          type: integer
          description: Internal artist identifier. Use this as `artist_id` in albums and tracks filters.
          example: 1
        name:
          type: string
          description: Display name of the artist.
          example: "Maher Zain"
        description:
          type: string
          nullable: true
          description: Short biography or description of the artist (nullable).
          example: "Swedish-Lebanese singer and songwriter of Islamic music."
        image_url:
          type: string
          description: URL to the artist's cover / profile image.
          example: "https://cdn.wikisubmission.org/artists/maher-zain.jpg"
        display_priority:
          type: integer
          description: Sort order for display; lower values appear first.
          example: 1

    MusicCategory:
      type: object
      description: A music category (genre / theme) used to classify tracks.
      required: [id, name, display_priority]
      properties:
        id:
          type: integer
          description: Internal category identifier. Use this as `category_id` in the tracks filter.
          example: 1
        name:
          type: string
          description: Display name of the category.
          example: "Nasheed"
        description:
          type: string
          nullable: true
          description: Short description of the category (nullable).
          example: "Vocal-only Islamic devotional music."
        display_priority:
          type: integer
          description: Sort order for display; lower values appear first.
          example: 1

    MusicAlbum:
      type: object
      description: A music album in the catalogue.
      required: [id, name, artist_id, release_date]
      properties:
        id:
          type: integer
          description: Internal album identifier. Use this as `album_id` in the tracks filter.
          example: 1
        name:
          type: string
          description: Album title.
          example: "Thank You Allah"
        artist_id:
          type: integer
          description: ID of the artist this album belongs to. Matches `id` in `MusicArtist`.
          example: 1
        release_date:
          type: string
          format: date
          description: Album release date in ISO 8601 format (`YYYY-MM-DD`).
          example: "2009-01-01"
        description:
          type: string
          nullable: true
          description: Short description of the album (nullable).
          example: null

    MusicTrack:
      type: object
      description: A single music track in the catalogue.
      required: [id, name, release_date, url, artist_id, featured]
      properties:
        id:
          type: integer
          description: Internal track identifier.
          example: 1
        name:
          type: string
          description: Track title.
          example: "Thank You Allah"
        release_date:
          type: string
          format: date
          description: Track release date in ISO 8601 format (`YYYY-MM-DD`).
          example: "2009-01-01"
        url:
          type: string
          description: Direct URL to the audio file or streaming resource.
          example: "https://cdn.wikisubmission.org/music/thank-you-allah.mp3"
        artist_id:
          type: integer
          description: ID of the artist. Matches `id` in `MusicArtist`.
          example: 1
        category_id:
          type: integer
          nullable: true
          description: ID of the category (nullable). Matches `id` in `MusicCategory`.
          example: 1
        album_id:
          type: integer
          nullable: true
          description: ID of the album (nullable). Matches `id` in `MusicAlbum`.
          example: 1
        featured:
          type: boolean
          description: >
            Whether this track is hand-picked as featured. Featured tracks are
            highlighted in the UI and can be filtered with `featured=true`.
          example: false
        lyrics:
          type: string
          nullable: true
          description: Full song lyrics (nullable). May contain newlines for line breaks.
          example: null

    # -----------------------------------------------------------------------
    # Communities (Sanity-backed)
    # -----------------------------------------------------------------------
    GeoPoint:
      type: object
      description: Latitude/longitude pair for a physical community.
      properties:
        lat:
          type: number
          format: double
          example: 36.7525
        lng:
          type: number
          format: double
          example: 3.0420

    Community:
      type: object
      description: >
        A community entry sourced from Sanity. The `kind` discriminator
        determines which optional fields are populated: `online` communities
        carry `platform`/`url`/`inviteCode`/`memberCount`; `physical`
        communities carry `address`/`city`/`country`/`geo`/`contactEmail`/
        `contactPhone`/`meetingSchedule`. The `imageUrl`, when present, points
        at the ws-backend image proxy and not directly at Sanity's CDN.
      required: [_id, kind, name, isActive]
      properties:
        _id:
          type: string
          description: Sanity document ID.
          example: drafts.community-foo
        kind:
          type: string
          enum: [online, physical]
          example: online
        name:
          type: string
          example: Submitters Discord
        slug:
          type: string
          example: submitters-discord
        language:
          type: string
          description: ISO 639-1 language code.
          example: en
        description:
          type: string
        imageUrl:
          type: string
          description: >
            Proxied image URL routed through `/sanity/image/...`. Preserves
            Sanity's image transform query string when present.
          example: /sanity/image/abc123-1024x768.jpg
        tags:
          type: array
          items:
            type: string
        isActive:
          type: boolean
          example: true
        # Online-only
        platform:
          type: string
          enum: [discord, telegram, whatsapp, facebook, x, youtube, other]
          example: discord
        url:
          type: string
          format: uri
        inviteCode:
          type: string
        memberCount:
          type: integer
          minimum: 0
        # Physical-only
        address:
          type: string
        city:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code.
          minLength: 2
          maxLength: 2
        geo:
          $ref: '#/components/schemas/GeoPoint'
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        meetingSchedule:
          type: string

    # -----------------------------------------------------------------------
    # Authenticated /me contract
    # -----------------------------------------------------------------------

    # cover-to-cover still uses the old bookmark row (kind = 'cover_to_cover')
    Bookmark:
      type: object
      required: [id, scripture, verse_key, name, color, kind, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string
        name:
          type: string
        color:
          type: string
        kind:
          type: string
          enum: [cover_to_cover]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CoverToCoverRequest:
      type: object
      required: [scripture, verse_key]
      properties:
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string

    BookmarkCategory:
      type: object
      required: [id, name, color, entry_count, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        color:
          type: string
        entry_count:
          type: integer
          description: Number of entries in this category.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BookmarkEntry:
      type: object
      required: [id, category_id, scripture, verse_key, created_at]
      properties:
        id:
          type: integer
          format: int64
        category_id:
          type: integer
          format: int64
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string
        created_at:
          type: string
          format: date-time

    CreateBookmarkCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string
          default: amber

    UpdateBookmarkCategoryRequest:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    CreateBookmarkEntryRequest:
      type: object
      required: [category_id, scripture, verse_key]
      properties:
        category_id:
          type: integer
          format: int64
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string

    Note:
      type: object
      required: [id, scripture, verse_key, content, tags, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string
        content:
          type: string
          description: Markdown content.
        tags:
          type: array
          description: Free-form labels used for filtering on the notes index.
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpsertNoteRequest:
      type: object
      required: [scripture, verse_key, content]
      properties:
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string
        content:
          type: string
          description: Markdown content.
        tags:
          type: array
          description: Free-form labels. Omit to leave existing tags unchanged.
          items:
            type: string

    SearchResult:
      type: object
      required: [source, verse_key, scripture, excerpt]
      properties:
        source:
          type: string
          enum: [note]
          description: Origin of this result. Only 'note' is returned here; verse results come from the existing /search endpoints.
        verse_key:
          type: string
        scripture:
          type: string
          enum: [quran, bible]
        excerpt:
          type: string
          description: Highlighted excerpt from the note content showing the match context.

    ScriptureState:
      type: object
      required: [bookmarks, notes]
      properties:
        bookmarks:
          type: object
          description: Map of verse_key to list of bookmark entries for that verse.
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/BookmarkEntry'
        notes:
          type: object
          description: Map of verse_key to the single note for that verse.
          additionalProperties:
            $ref: '#/components/schemas/Note'

    ReadingProgress:
      type: object
      required: [scripture, verse_key, updated_at]
      properties:
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string
        updated_at:
          type: string
          format: date-time

    PutReadingProgressRequest:
      type: object
      required: [scripture, verse_key]
      properties:
        scripture:
          type: string
          enum: [quran, bible]
        verse_key:
          type: string

    Streak:
      type: object
      required: [current_streak, longest_streak, total_verses_read]
      properties:
        current_streak:
          type: integer
        longest_streak:
          type: integer
        last_active_day:
          type: string
        total_verses_read:
          type: integer

    PostReadingLogRequest:
      type: object
      required: [scripture]
      properties:
        scripture:
          type: string
          enum: [quran, bible]
        verses_read:
          type: integer
          minimum: 1
          default: 1
        day:
