  responses:
    Conflict:
      description: >
        The request could not be completed due to a conflict with the current
        state of the resource. Resolve the conflict and try again.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    NotFound:
      description: >
        The server cannot find the requested resource. The endpoint may be
        invalid or the resource may no longer exist.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    BadRequest:
      description: >
        The server could not understand the request due to invalid syntax.
        The client should modify the request and try again.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    InternalServerErrror:
      description: >
        The server encountered an unexpected condition that prevented it from
        fulfilling the request. Report the issue to the support team if it
        persists.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    Forbidden:
      description: >
        The caller is authenticated but lacks the required editorial
        permission for this resource.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    NotImplementedError:
      description: The requested operation is not yet implemented.
      content:
        application/json:
          schema:
            type: object
            required: [message, code]
            properties:
              message:
                type: string
                example: "This endpoint is under development."
              code:
                type: string
                example: "NOT_IMPLEMENTED"
    BadGateway:
      description: >
        The upstream content source (Sanity) returned an error or was
        unreachable. The response is structurally valid but the request could
        not be fulfilled.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
