                      </p>
                    </div>
                    <div className="mt-8 pt-6 border-t border-surface-container flex gap-4 text-sm text-on-surface-variant italic leading-relaxed">

                <div className="bg-surface-container-lowest shadow-xl border border-outline-variant/20 rounded-full px-6 py-3 flex items-center gap-6 backdrop-blur-lg bg-opacity-95 dark:bg-zinc-900/95">
                  <button className="bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center shrink-0">
                    <span className="material-symbols-outlined">
                      play_arrow
                    </span>
                  </button>
                  <div className="flex-grow">
                    <div className="flex justify-between text-[10px] uppercase font-bold tracking-widest text-on-surface-variant mb-1">
                      <span>Verse 25:1</span>
                      <span className="hidden sm:inline">
                        Reciter: Al-Minshawi
                      </span>
                    </div>
                    <div className="h-1 bg-surface-container rounded-full overflow-hidden">
                      <div className="h-full bg-primary w-1/3"></div>
                    </div>

                  <span className="material-symbols-outlined text-on-surface-variant cursor-pointer">
                    close

      const SearchResultsPage = () => {
        return (
          <main className="pt-32 pb-20 px-8 max-w-screen-2xl mx-auto">
            <div className="mb-16">
              <p className="font-label text-primary font-semibold tracking-widest uppercase text-xs mb-4">
                Search Results
              </p>
              <h1 className="font-headline text-5xl font-extrabold tracking-tighter">
                “Submission”
              </h1>
              <p className="text-on-surface-variant mt-4 font-light text-lg">
                Found 142 entries across the library and scriptures.
              </p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-16">
              <aside className="lg:col-span-3 space-y-12">
                <div>
                  <h3 className="font-headline text-sm font-bold uppercase tracking-widest mb-6">
                    Category
                  </h3>
                  <div className="space-y-3">
                    {['Quran', 'Tools', 'Articles'].map((cat) => (
                      <label
                        key={cat}
                        className="flex items-center gap-3 cursor-pointer group"
                      >
                        <input
                          type="checkbox"
                          className="rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low"
                          defaultChecked={cat !== 'Articles'}
                        />
                        <span className="font-medium group-hover:text-primary transition-colors">
                          {cat}
                        </span>
                        <span className="ml-auto text-xs text-on-surface-variant bg-surface-container px-2 py-0.5 rounded-full">
                          {cat === 'Quran' ? 84 : cat === 'Tools' ? 12 : 46}
                        </span>
                      </label>
                    ))}
                  </div>
                </div>
                <button className="w-full py-4 px-6 bg-surface-container-highest text-on-surface font-bold text-sm rounded-lg hover:bg-surface-container-high transition-all">
                  Clear Filters
                </button>
              </aside>

              <div className="lg:col-span-9 space-y-16">
                <article className="group">
                  <div className="flex items-start justify-between mb-4">
                    <div className="flex items-center gap-3">
                      <span className="w-8 h-8 flex items-center justify-center bg-primary-fixed text-primary rounded-full">
                        <span className="material-symbols-outlined text-sm">
                          auto_stories
                        </span>
                      </span>
                      <span className="text-xs font-bold text-primary tracking-widest uppercase">
                        Scripture / Sura 2:112
                      </span>
                    </div>
                    <span className="text-xs text-on-surface-variant font-medium">
                      Relevance: 98%
                    </span>
                  </div>
                  <div className="bg-surface-container-lowest p-8 rounded-xl shadow-[0_12px_40px_rgba(26,28,28,0.03)] group-hover:shadow-[0_12px_40px_rgba(26,28,28,0.06)] transition-all dark:bg-zinc-900/50">
                    <h2 className="font-headline text-2xl font-bold mb-4 leading-snug group-hover:text-primary transition-colors cursor-pointer">
                      The True Meaning of Submission
                    </h2>
                    <p className="text-on-surface-variant leading-relaxed text-lg font-light mb-6">
                      "Indeed, those who{' '}
                      <mark className="bg-primary-fixed text-primary px-1">
                        submit
                      </mark>{' '}
                      themselves completely to God, while leading a righteous
                      life, shall receive their recompense from their Lord..."
                    </p>
                  </div>
                </article>
              </div>
            </div>
          </main>
        )
      }

      // --- App Component ---

      const App = () => {
        const [isDarkMode, setIsDarkMode] = useState(false)

        useEffect(() => {
          if (isDarkMode) {
            document.documentElement.classList.add('dark')
            document.documentElement.classList.remove('light')
          } else {
            document.documentElement.classList.remove('dark')
            document.documentElement.classList.add('light')
          }
        }, [isDarkMode])

        const toggleDarkMode = () => setIsDarkMode(!isDarkMode)

        return (
          <MemoryRouter>
            <div
              className={`min-h-screen flex flex-col transition-colors duration-300 ${isDarkMode ? 'bg-zinc-950 text-zinc-100' : 'bg-surface text-on-surface'}`}
            >
              <Navigation
                isDarkMode={isDarkMode}
                toggleDarkMode={toggleDarkMode}
              />

              <div className="grow">
                <Routes>
                  <Route path="/" element={<HomePage />} />
                  <Route path="/tools" element={<ToolsPage />} />
                  <Route path="/library" element={<LibraryPage />} />
                  <Route path="/search" element={<SearchResultsPage />} />
                </Routes>
              </div>

              <Footer isDarkMode={isDarkMode} />
            </div>
          </MemoryRouter>
        )
      }

      const rootElement = document.getElementById('root')
      const root = createRoot(rootElement)
      root.render(<App />)
    </script>
  </body>
</html>
